  <main class="container">

  <div class="section" id="bootstrap-section">
    <fieldset class="section-box">
      <legend>Bootstrap Agent</legend>

      <!--
        Pre-bootstrap UI — intro, Person Server picker, hidden hints
        inputs, and the Bootstrap agent button. Once bootstrapped this
        whole block is hidden by setAuthenticated so the fieldset
        collapses to just the protocol log + Agent Identity rows below.
        Reset lives on the Authorization Request fieldset's Reset button.
      -->
      <div id="bootstrap-controls">
        <p style="color: var(--muted); font-size: 0.9rem;">Bootstrap establishes the binding between you and this agent server.</p>
        <!-- No scopes are requested here; choose scopes at authorization. -->
        <details id="ps-details-bootstrap" class="section-group" open>
          <summary class="section-heading">
            <span>Person Server</span>
            <svg class="section-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
            <span class="ps-current mono hidden" id="ps-current"></span>
          </summary>
          <ul class="server-list" id="ps-list">
            <li>
              <label class="radio-label"><input type="radio" name="ps" value="https://person.hello.coop"> <span>https://person.hello.coop</span></label>
              <button class="copy-btn" type="button" data-copy="https://person.hello.coop" aria-label="Copy"></button>
            </li>
            <li class="custom-row">
              <label class="radio-label"><input type="radio" name="ps" value="custom" id="ps-custom-radio"></label>
              <input type="url" id="ps-custom" placeholder="https://ps.example" autocomplete="off">
            </li>
          </ul>
        </details>

        <div class="authz-actions">
          <button id="bootstrap-btn" type="button">Bootstrap agent</button>
        </div>
      </div>

      <!--
        Per-section protocol log. Bootstrap's network calls render
        inline here so the user's focus never leaves the fieldset they
        just acted on. Separate log instances live inside Authorization
        Request and (when agent-token refresh fires) Agent Identity.
        Each addLogSection() call wraps its steps in a collapsible
        <details>, so the section heading (BOOTSTRAP / REFRESH / …) is
        itself the disclosure target — no separate "Protocol log"
        header row.
      -->
      <div class="protocol-log hidden" id="bootstrap-log"></div>

      <!--
        Post-bootstrap Agent Identity content lives inline here rather
        than in its own fieldset — once bootstrap completes, the
        "Bound as …" line + agent-token panels drop in below the
        protocol log so the whole ceremony reads as one continuous
        box instead of jumping to a second card. setAuthenticated()
        removes the `hidden` class.
      -->
      <div id="auth-section" class="hidden" data-test="auth-card">
        <div id="auth-info" style="margin-top: 1rem;">
          <p><span class="step-status step-status-success">&#x2713;</span> Bound as <strong id="auth-user"></strong></p>
        </div>
        <div id="token-section">
          <div id="agent-id-row" style="margin-top: 0.75rem;">
            <label>Agent Token</label>
            <div class="readonly-field">
              <span class="readonly-field-text" id="agent-id"></span>
              <button class="copy-btn" type="button" data-copy-target="#agent-id" aria-label="Copy"></button>
            </div>
          </div>
          <details class="section-group">
            <summary class="section-heading">
              <span>Agent Token (aa-agent+jwt)</span>
              <svg class="section-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
            </summary>
            <div class="token-wrap">
              <button class="copy-btn copy-btn-float" type="button" data-copy-target="#agent-token-raw" aria-label="Copy"></button>
              <div class="token-display" id="agent-token-raw"></div>
            </div>
          </details>
          <details class="section-group">
            <summary class="section-heading">
              <span>Decoded Payload</span>
              <svg class="section-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
            </summary>
            <div class="token-wrap">
              <button class="copy-btn copy-btn-float" type="button" data-copy-target="#token-payload" aria-label="Copy"></button>
              <div class="token-display" id="token-payload"></div>
            </div>
          </details>
        </div>
      </div>
    </fieldset>
  </div>

  <div class="section hidden" id="authz-section">
    <fieldset class="section-box">
      <legend>Authorization Request</legend>

      <details class="section-group" open>
        <summary class="section-heading">
          <span>Identity scopes</span>
          <svg class="section-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
        </summary>
        <div class="scope-grid" id="identity-scope-grid"></div>
      </details>

      <details class="section-group" open>
        <summary class="section-heading">
          <span>Resource scopes</span>
          <svg class="section-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
        </summary>
        <div class="scope-grid" id="resource-scope-grid"></div>
      </details>

      <!--
        OIDC-style routing hints read at /aauth/token time. Each row has
        an enable checkbox so a user can keep a value parked in the input
        but omit it from the request — getHints() in protocol.js filters
        on .hint-enable[data-hint-for=<kebab id>] and sends only checked
        rows. Hints live here (not on Bootstrap) because in v3 they flow
        through the authorize call, not bootstrap.
      -->
      <details class="section-group">
        <summary class="section-heading">
          <span>Hints</span>
          <svg class="section-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
        </summary>
        <div class="hints-grid">
          <label class="hint-row">
            <input type="checkbox" class="hint-enable" data-hint-for="login-hint">
            <span class="hint-name">login_hint</span>
            <input type="text" id="login-hint" placeholder="user@example.com">
          </label>
          <label class="hint-row">
            <input type="checkbox" class="hint-enable" data-hint-for="domain-hint">
            <span class="hint-name">domain_hint</span>
            <input type="text" id="domain-hint" placeholder="example.com">
          </label>
          <label class="hint-row">
            <input type="checkbox" class="hint-enable" data-hint-for="provider-hint">
            <span class="hint-name">provider_hint</span>
            <input type="text" id="provider-hint" placeholder="github">
          </label>
          <label class="hint-row">
            <input type="checkbox" class="hint-enable" data-hint-for="tenant">
            <span class="hint-name">tenant</span>
            <input type="text" id="tenant" placeholder="ten_xxx_xxx">
          </label>
        </div>
      </details>

      <div class="authz-actions">
        <button id="authz-btn" type="button">Continue</button>
        <button id="reset-btn" type="button" class="btn-outline" title="Clear saved PS, scopes, binding, and tokens">Reset</button>
      </div>

      <!-- Authorization's network calls log inline here — separate
           instance from #bootstrap-log so each fieldset tells a
           self-contained story of one protocol round trip. Section
           headings added by addLogSection() are themselves
           collapsible <details> disclosures. -->
      <div class="protocol-log hidden" id="authz-log"></div>
    </fieldset>
  </div>

  <!-- Legacy shared log container kept for any call sites not yet
       retargeted. New code should target #bootstrap-log or #authz-log
       via setActiveLog(). -->
  <div class="section hidden" id="log-section">
    <fieldset class="section-box">
      <legend>Protocol Log</legend>
      <div id="protocol-log"></div>
    </fieldset>
  </div>

  </main>
  <script src="/app.js"></script>
  <script src="/protocol.js"></script>
